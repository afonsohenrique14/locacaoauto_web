<div class="vehicles">
  <p-card class="actions-vehicle">
    <p-button
      label="Adicionar"
      icon="pi pi-plus"
      iconPos="right"
      (click)="this.router.navigate(['app/landlord/vehicles/vehicle-form'])"
    ></p-button>
  </p-card>
  <p-card class="vehicle-card">
    <p-table
      [value]="veiculos()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="10"
      dataKey="id">

      <ng-template #header>
        <tr>
          <th>Placa</th>
          <th>Marca/Modelo</th>
          <th>Ano</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template #body let-veiculo>
        <tr>
          <td>{{ veiculo.plate }}</td>
          <td>{{ veiculo.brand }} {{ veiculo.model }}</td>
          <td>{{ veiculo.manufactureYear }} / {{ veiculo.modelYear }}</td>
          <td>
            <p-tag [value]="veiculo.status" [severity]="getSeverity(veiculo.status)" />
          </td>
          <td>
            <!-- botões de editar/deletar -->
          </td>
        </tr>
      </ng-template>

    </p-table>
  </p-card>
</div>
