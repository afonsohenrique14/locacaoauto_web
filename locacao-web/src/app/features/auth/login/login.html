<div class="login">
  <p-card class="login-card">
    <ng-template #content>
      <div class="login-panel">
        <div class="login-left">
          <app-auth-panel />
        </div>

        <div class="login-right">
          <div class="login-header">
            <h2 class="login-title">Entrar</h2>
            <p class="login-subtitle">
              Não tem uma conta?
              <a routerLink="/auth/register" class="login-link">Criar conta</a>
            </p>
          </div>

          <form [formGroup]="loginForm" class="login-form">
            <p-float-label variant="on">
              <input pInputText id="email" formControlName="email" />
              <label for="email">Email</label>
            </p-float-label>

            <p-float-label variant="on">
              <p-password
                id="password"
                formControlName="password"
                [toggleMask]="true"
                [feedback]="false"
                autocomplete="off"
              />
              <label for="password">Senha</label>
            </p-float-label>

            <a class="login-forgot" routerLink="/auth/forgot-password"> Esqueci minha senha </a>

            <p-button label="Entrar" icon="pi pi-sign-in" [fluid]="true" (click)="onSubmit()" />
          </form>
        </div>
      </div>
    </ng-template>
  </p-card>
</div>
